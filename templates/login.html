<!DOCTYPE html>
<html lang="en">
<head>
  <title>Attendance Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d1117;
      --paper: #f5f0e8;
      --accent: #c84b31;
      --muted: #8a8070;
      --line: #d4cdc0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .panel-left {
      flex: 1;
      background: var(--ink);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      overflow: hidden;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 40px,
        rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px
      );
    }

    .big-time {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(80px, 12vw, 160px);
      color: white;
      line-height: 0.85;
      letter-spacing: -4px;
      opacity: 0.08;
      position: absolute;
      bottom: 40px;
      left: 40px;
      pointer-events: none;
      user-select: none;
    }

    .brand { position: relative; z-index: 1; }

    .brand-mark {
      width: 48px; height: 48px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
    }

    .brand-mark svg { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 1.5; }

    .brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px; color: white; line-height: 1.1; margin-bottom: 16px;
    }

    .brand p {
      font-size: 14px; color: rgba(255,255,255,0.4);
      font-weight: 300; line-height: 1.6; max-width: 280px;
    }

    .stats-row { position: relative; z-index: 1; display: flex; gap: 40px; }

    .stat { display: flex; flex-direction: column; gap: 4px; }

    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; color: white; font-style: italic;
    }

    .stat-label {
      font-size: 11px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500;
    }

    .panel-right {
      width: 480px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 60px 48px;
      background: var(--paper);
      position: relative;
    }

    .panel-right::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, transparent, var(--line), transparent);
    }

    .form-wrap { width: 100%; max-width: 340px; }

    .form-eyebrow {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent); margin-bottom: 12px;
    }

    .form-title {
      font-family: 'DM Serif Display', serif;
      font-size: 42px; color: var(--ink); line-height: 1; margin-bottom: 8px;
    }

    .form-title em { font-style: italic; color: var(--muted); }

    .form-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 44px; font-weight: 300;
    }

    .divider {
      width: 40px; height: 2px;
      background: var(--accent); margin: 20px 0 44px;
    }

    .field { margin-bottom: 24px; }

    .field label {
      display: block; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin-bottom: 10px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--muted); fill: none; stroke-width: 1.5;
      pointer-events: none; transition: stroke 0.2s;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: white;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: #bbb5a8; }

    .input-wrap input:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(13,17,23,0.06);
    }

    .input-wrap:focus-within svg { stroke: var(--ink); }

    /* error message */
    .error-msg {
      color: var(--accent);
      font-size: 12px;
      margin: -12px 0 16px;
      display: none;
    }

    .field-options {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 36px; margin-top: 4px;
    }

    .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }

    .remember input[type="checkbox"] {
      appearance: none; width: 16px; height: 16px;
      border: 1.5px solid var(--line); border-radius: 4px;
      cursor: pointer; position: relative;
      transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--ink); border-color: var(--ink);
    }

    .remember input[type="checkbox"]:checked::after {
      content: '';
      position: absolute; left: 4px; top: 2px;
      width: 5px; height: 8px;
      border: 1.5px solid white; border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .remember span { font-size: 12px; color: var(--muted); }

    .forgot {
      font-size: 12px; color: var(--muted); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .forgot:hover { color: var(--ink); border-color: var(--ink); }

    .btn-login {
      width: 100%; padding: 15px 24px;
      background: var(--ink); color: white;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
      pointer-events: none;
    }

    .btn-login:hover { background: #1e2730; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .btn-login svg {
      width: 16px; height: 16px;
      fill: none; stroke: white; stroke-width: 1.5;
      transition: transform 0.2s;
    }

    .btn-login:hover svg { transform: translateX(3px); }

    /* loading state */
    .btn-login.loading { opacity: 0.7; pointer-events: none; }

    .form-footer {
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .form-footer span { font-size: 12px; color: var(--muted); }

    .form-footer a {
      font-size: 12px; color: var(--ink); font-weight: 500;
      text-decoration: none; border-bottom: 1px solid var(--ink);
      transition: opacity 0.2s;
    }

    .form-footer a:hover { opacity: 0.6; }

    @media (max-width: 820px) {
      .panel-left { display: none; }
      .panel-right { width: 100%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-eyebrow { animation: fadeUp 0.5s ease both; }
    .form-title   { animation: fadeUp 0.5s ease 0.06s both; }
    .form-sub     { animation: fadeUp 0.5s ease 0.10s both; }
    .divider      { animation: fadeUp 0.5s ease 0.12s both; }
    .field        { animation: fadeUp 0.5s ease 0.16s both; }
    .field-options { animation: fadeUp 0.5s ease 0.24s both; }
    .btn-login    { animation: fadeUp 0.5s ease 0.28s both; }
    .form-footer  { animation: fadeUp 0.5s ease 0.32s both; }
  </style>
</head>
<body>

  <!-- Left panel -->
  <div class="panel-left">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Track<br>your records.</h1>
      <p>Seamless attendance management for modern organisations.</p>
    </div>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num">98%</span>
        <span class="stat-label">Accuracy</span>
      </div>
      <div class="stat">
        <span class="stat-num">12k+</span>
        <span class="stat-label">Users</span>
      </div>
      <div class="stat">
        <span class="stat-num">Live</span>
        <span class="stat-label">Real-time</span>
      </div>
    </div>
    <div class="big-time" id="clock">00:00</div>
  </div>

  <!-- Right form panel -->
  <div class="panel-right">
    <div class="form-wrap">
      <p class="form-eyebrow">Attendance Portal</p>
      <h2 class="form-title">Welcome<br><em>back.</em></h2>
      <p class="form-sub">Sign in to view your attendance records.</p>
      <div class="divider"></div>

      <form id="loginForm">

        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <!-- Single clean error message -->
        <p class="error-msg" id="errorMsg">Invalid username or password.</p>

        <div class="field-options">
          <label class="remember">
            <input type="checkbox" id="rememberMe">
            <span>Keep me signed in</span>
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Sign In
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

      </form>

      <div class="form-footer">
        <span>New employee?</span>
        <a href="#">Request access</a>
      </div>
    </div>
  </div>

  <script>
    // ── Clock ──────────────────────────────────────────────────────
    function updateClock() {
      document.getElementById("clock").textContent =
        new Date().toLocaleTimeString("en-IN", {
          hour: "2-digit", minute: "2-digit"
        });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Redirect if already logged in ─────────────────────────────
    if (localStorage.getItem("token")) {
      window.location.href = "/dashboard";
    }

    // ── Login form ────────────────────────────────────────────────
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const loginBtn = document.getElementById("loginBtn");

      errorMsg.style.display = "none";
      loginBtn.classList.add("loading");
      loginBtn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user",  username);
          window.location.href = "/dashboard";  // FIX: Flask route not .html file
        } else {
          errorMsg.style.display = "block";
          loginBtn.classList.remove("loading");
          loginBtn.innerHTML = `Sign In
            <svg viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>`;
        }

      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Could not reach server. Is it running?";
        errorMsg.style.display = "block";
        loginBtn.classList.remove("loading");
        loginBtn.innerHTML = `Sign In
          <svg viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>`;
      }
    });
  </script>
</body>
</html>
